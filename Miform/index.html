<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Personas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="container">
    <section class="card">
      <h1>Registrar persona</h1>

      <form id="personaForm">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" maxlength="50" required>
        </div>

        <div class="form-group">
          <label for="apellidos">Apellidos</label>
          <input type="text" id="apellidos" name="apellidos" maxlength="50" required>
        </div>

        <div class="form-group">
          <label for="altura">Altura</label>
          <input type="number" id="altura" name="altura" step="0.01" min="0" max="9.99" required>
          <small>Ejemplo: 1.75</small>
        </div>

        <div class="form-group">
          <label for="peso">Peso</label>
          <input type="number" id="peso" name="peso" step="0.01" min="0" max="999.99" required>
          <small>Ejemplo: 72.50</small>
        </div>

        <button type="submit">Guardar persona</button>

        <p id="mensaje" class="mensaje"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
